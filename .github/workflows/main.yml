name: Build and Deploy

on:
  push:
    branches: [ main ]          # main 브랜치에 푸시될 때만 실행
  pull_request:
    branches: [ main ]          # PR 시에도 빌드 검증
  workflow_dispatch:         # 수동 실행 옵션

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: PNPM 설치
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: 의존성 설치
        run: pnpm install --no-frozen-lockfile

      - name: 린트 및 타입 검사
        run: |
          pnpm lint --no-error-on-unmatched-pattern || true
          pnpm check-types || true

      - name: 앱 빌드 (Turbo)
        run: pnpm turbo run build --no-cache

      - name: 압축
        run: zip -r build-artifacts.zip apps/web/dist apps/streamer/dist

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: EC2로 파일 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "build-artifacts.zip"
          target: "/home/ec2-user/deploy/"
          overwrite: true

      - name: EC2 원격 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "[Deploy] 압축 해제 시작"
            
            cd /home/ec2-user/deploy
            unzip -o build-artifacts.zip
            rm build-artifacts.zip
            
            echo "[Deploy] Nginx Docker 컨테이너에 빌드 반영됨 (볼륨 마운트)"
            
            docker exec nginx nginx -s reload
            
            echo "[Deploy] EC2 배포 완료: $(date)"